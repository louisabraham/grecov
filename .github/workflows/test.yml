name: Test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.14"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install IPOPT
        run: sudo apt-get install -y coinor-libipopt-dev liblapack-dev libblas-dev

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install .[test,ipopt]

      - name: Run tests
        run: pytest -v

  test-r:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - uses: r-lib/actions/setup-r@v2

      - name: Install system dependencies
        run: sudo apt-get install -y coinor-libipopt-dev liblapack-dev libblas-dev libpng-dev

      - name: Install Python package
        run: |
          pip install --upgrade pip
          pip install .[test,ipopt]

      - name: Install R dependencies
        run: |
          Rscript -e 'install.packages(c("reticulate", "testthat"), repos = "https://cloud.r-project.org")'

      - name: Install R package
        run: R CMD INSTALL r-package

      - name: Run R tests
        env:
          RETICULATE_PYTHON: ${{ env.pythonLocation }}/bin/python
        run: |
          Rscript -e 'testthat::test_dir("r-package/tests/testthat")'
