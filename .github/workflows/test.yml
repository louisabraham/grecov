name: Test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.14"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install IPOPT
        run: sudo apt-get install -y coinor-libipopt-dev liblapack-dev libblas-dev

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install .[test,ipopt]

      - name: Run tests
        run: pytest -v
