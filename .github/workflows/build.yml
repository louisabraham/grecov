name: Build and publish

on:
  push:
    branches: [main]

permissions:
  contents: write
  id-token: write
  issues: write

jobs:
  check_version:
    name: Check for new version
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.check.outputs.new_version }}
      tag: ${{ steps.check.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if version tag exists
        id: check
        run: |
          VERSION=$(python3 -c "
          import re
          with open('pyproject.toml') as f:
              m = re.search(r'^version\s*=\s*\"([^\"]+)\"', f.read(), re.M)
              print(m.group(1))
          ")
          TAG="v${VERSION}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists"
            echo "new_version=false" >> "$GITHUB_OUTPUT"
          else
            echo "New version $TAG detected"
            echo "new_version=true" >> "$GITHUB_OUTPUT"
          fi

  build_wheels:
    name: Wheels (${{ matrix.os }})
    needs: [check_version]
    if: needs.check_version.outputs.new_version == 'true'
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux-intel
            runs-on: ubuntu-latest
          - os: linux-arm
            runs-on: ubuntu-24.04-arm
          - os: macos-intel
            runs-on: macos-15-intel
          - os: macos-arm
            runs-on: macos-latest
          - os: windows
            runs-on: windows-latest
          - os: pyodide
            runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.23
        env:
          CIBW_BUILD: "cp312-* cp313-*"
          CIBW_SKIP: "pp* *-win32 *-manylinux_i686 *-musllinux*"
          CIBW_BEFORE_TEST_LINUX: "yum install -y epel-release && yum install -y openblas-devel || true"
          CIBW_TEST_REQUIRES: "pytest"
          CIBW_TEST_COMMAND: "pytest {project}/tests -q"
          CIBW_BUILD_VERBOSITY: 1
          CIBW_ENVIRONMENT_MACOS: "MACOSX_DEPLOYMENT_TARGET=10.13"
          CIBW_PLATFORM: ${{ matrix.os == 'pyodide' && 'pyodide' || '' }}

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  build_sdist:
    name: sdist
    needs: [check_version]
    if: needs.check_version.outputs.new_version == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pipx run build --sdist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  publish:
    name: Publish
    needs: [build_wheels, build_sdist, check_version]
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4

      - name: Create tag and release
        run: |
          git tag ${{ needs.check_version.outputs.tag }}
          git push origin ${{ needs.check_version.outputs.tag }}
          gh release create ${{ needs.check_version.outputs.tag }} \
            --title ${{ needs.check_version.outputs.tag }} \
            --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Upload to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
