name: Deploy Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write
  pages: write

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build pyodide wheel
        run: |
          pip install pyodide-build
          pyodide build

      - name: Test
        run: |
          pyodide venv .venv-pyodide
          .venv-pyodide/bin/pip install pytest dist/*.whl
          .venv-pyodide/bin/python -m pytest tests -q -k "not coverage"

      - name: Assemble site
        run: |
          mkdir _site
          cp docs/index.html _site/
          sed "s/__CACHE_VERSION__/${{ github.sha }}/" docs/sw.js > _site/sw.js
          cp dist/*.whl _site/
          echo "$(ls _site/*.whl | xargs -n1 basename)" > _site/wheel.txt

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
