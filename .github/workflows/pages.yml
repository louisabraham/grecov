name: Deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  pages: write

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build pyodide wheel
        run: |
          pip install pyodide-build
          pyodide build

      - name: Download cyipopt pyodide wheel
        run: |
          # Match the pyodide ABI tag from the grecov wheel we just built
          GRECOV_WHL=$(ls dist/grecov-*-pyodide_*.whl 2>/dev/null | head -1)
          ABI_TAG=$(echo "$GRECOV_WHL" | grep -oP 'pyodide_\d+_\d+_wasm32')
          CP_TAG=$(echo "$GRECOV_WHL" | grep -oP 'cp\d+' | head -1)
          WHEEL_NAME="cyipopt-1.7.0.dev0-${CP_TAG}-${CP_TAG}-${ABI_TAG}.whl"
          echo "Downloading ${WHEEL_NAME}"
          curl -fL -o "dist/${WHEEL_NAME}" \
            "https://github.com/louisabraham/cyipopt/releases/download/v1.7.0.dev0/${WHEEL_NAME}"

      - name: Test
        run: |
          pyodide venv .venv-pyodide
          .venv-pyodide/bin/pip install pytest dist/*.whl
          .venv-pyodide/bin/python -m pytest tests -q -k "not coverage"

      - name: Assemble site
        run: |
          mkdir _site
          cp docs/index.html _site/
          sed "s/__CACHE_VERSION__/${{ github.sha }}/" docs/sw.js > _site/sw.js
          cp dist/*.whl _site/
          echo "$(ls _site/*.whl | xargs -n1 basename)" > _site/wheel.txt

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
